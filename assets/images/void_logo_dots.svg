<svg width="255" height="74" viewBox="0 0 255 74" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="cursor-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="unlit-leds" x="5.5" y="5.5" width="9" height="9" patternUnits="userSpaceOnUse">
      <circle cx="4.5" cy="4.5" r="2.2" fill="#151515"/>
    </pattern>
  </defs>

  <rect width="255" height="74" fill="#080808" rx="8"/>
  <rect x="0" y="0" width="255" height="74" fill="url(#unlit-leds)"/>

  <g filter="url(#glow)">
    <!-- / (smaller and shifted right, overall shifted left) -->
    <circle cx="46" cy="19" r="3" fill="#ffffff"/>
    <circle cx="37" cy="28" r="3" fill="#ffffff"/>
    <circle cx="28" cy="37" r="3" fill="#ffffff"/>
    <circle cx="19" cy="46" r="3" fill="#ffffff"/>
    <circle cx="10" cy="55" r="3" fill="#ffffff"/>
    <!-- v -->
    <circle cx="55" cy="28" r="3" fill="#ffffff"/>
    <circle cx="91" cy="28" r="3" fill="#ffffff"/>
    <circle cx="55" cy="37" r="3" fill="#ffffff"/>
    <circle cx="91" cy="37" r="3" fill="#ffffff"/>
    <circle cx="64" cy="46" r="3" fill="#ffffff"/>
    <circle cx="82" cy="46" r="3" fill="#ffffff"/>
    <circle cx="64" cy="55" r="3" fill="#ffffff"/>
    <circle cx="82" cy="55" r="3" fill="#ffffff"/>
    <circle cx="73" cy="64" r="3" fill="#ffffff"/>
    <!-- o -->
    <circle cx="118" cy="28" r="3" fill="#ffffff"/>
    <circle cx="127" cy="28" r="3" fill="#ffffff"/>
    <circle cx="136" cy="28" r="3" fill="#ffffff"/>
    <circle cx="109" cy="37" r="3" fill="#ffffff"/>
    <circle cx="145" cy="37" r="3" fill="#ffffff"/>
    <circle cx="109" cy="46" r="3" fill="#ffffff"/>
    <circle cx="145" cy="46" r="3" fill="#ffffff"/>
    <circle cx="109" cy="55" r="3" fill="#ffffff"/>
    <circle cx="145" cy="55" r="3" fill="#ffffff"/>
    <circle cx="118" cy="64" r="3" fill="#ffffff"/>
    <circle cx="127" cy="64" r="3" fill="#ffffff"/>
    <circle cx="136" cy="64" r="3" fill="#ffffff"/>
    <!-- i -->
    <circle cx="163" cy="10" r="3" fill="#ffffff"/>
    <circle cx="163" cy="28" r="3" fill="#ffffff"/>
    <circle cx="163" cy="37" r="3" fill="#ffffff"/>
    <circle cx="163" cy="46" r="3" fill="#ffffff"/>
    <circle cx="163" cy="55" r="3" fill="#ffffff"/>
    <circle cx="163" cy="64" r="3" fill="#ffffff"/>
    <!-- d -->
    <circle cx="217" cy="10" r="3" fill="#ffffff"/>
    <circle cx="217" cy="19" r="3" fill="#ffffff"/>
    <circle cx="190" cy="28" r="3" fill="#ffffff"/>
    <circle cx="199" cy="28" r="3" fill="#ffffff"/>
    <circle cx="208" cy="28" r="3" fill="#ffffff"/>
    <circle cx="217" cy="28" r="3" fill="#ffffff"/>
    <circle cx="181" cy="37" r="3" fill="#ffffff"/>
    <circle cx="217" cy="37" r="3" fill="#ffffff"/>
    <circle cx="181" cy="46" r="3" fill="#ffffff"/>
    <circle cx="217" cy="46" r="3" fill="#ffffff"/>
    <circle cx="181" cy="55" r="3" fill="#ffffff"/>
    <circle cx="217" cy="55" r="3" fill="#ffffff"/>
    <circle cx="190" cy="64" r="3" fill="#ffffff"/>
    <circle cx="199" cy="64" r="3" fill="#ffffff"/>
    <circle cx="208" cy="64" r="3" fill="#ffffff"/>
    <circle cx="217" cy="64" r="3" fill="#ffffff"/>
  </g>

  <!-- | cursor with a slightly larger gap -->
  <g filter="url(#cursor-glow)">
    <circle cx="235" cy="10" r="3.2" fill="#ffffff"/>
    <circle cx="235" cy="19" r="3.2" fill="#ffffff"/>
    <circle cx="235" cy="28" r="3.2" fill="#ffffff"/>
    <circle cx="235" cy="37" r="3.2" fill="#ffffff"/>
    <circle cx="235" cy="46" r="3.2" fill="#ffffff"/>
    <circle cx="235" cy="55" r="3.2" fill="#ffffff"/>
    <circle cx="235" cy="64" r="3.2" fill="#ffffff"/>
  </g>
