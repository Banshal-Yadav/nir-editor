name: Build
on: 
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable long paths
        run: git config --system core.longpaths true
      - uses: actions/checkout@v4
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: void-exe
          path: target/release/zed.exe